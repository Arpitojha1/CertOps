services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    command: celery -A tasks worker --loglevel=info
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PYTHONPATH: /app/src
    depends_on:
      - redis
    volumes:
      - ./:/app

  vault:
    image: hashicorp/vault:latest
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK

  nginx:
    image: nginx:alpine
    environment:
      SSH_PASSWORD: "${SSH_PASSWORD:-certops}"
    ports:
      - "443:443"
      - "2222:22"
    volumes:
      # Map your config file
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Map the folder containing your local.crt and local.key read-write for deployment
      - ./:/etc/nginx/certs:rw
    command: >
      /bin/sh -c "apk add --no-cache openssh &&
      ssh-keygen -A &&
      echo \"root:$${SSH_PASSWORD:-certops}\" | chpasswd &&
      sed -i 's/#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config &&
      /usr/sbin/sshd &&
      nginx -g 'daemon off;'"