services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery_worker:
    build: .
    working_dir: /app/certops-agent
    command: celery -A src.tasks worker --loglevel=info
    env_file:
      - .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PYTHONPATH: /app/certops-agent:/app/certops-agent/src
      VAULT_ADDR: http://vault:8200
    depends_on:
      redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    volumes:
      - ./:/app

  vault:
    image: hashicorp/vault:latest
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8200/v1/sys/health?standbyok=true"]
      interval: 5s
      timeout: 3s
      retries: 10

  nginx:
    image: nginx:alpine
    environment:
      SSH_PASSWORD: "${SSH_PASSWORD:-certops}"
    ports:
      - "443:443"
      - "2222:22"
    volumes:
      # Map your config file
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Map the folder containing your local.crt and local.key read-write for deployment
      - ./:/etc/nginx/certs:rw
    command: >
      /bin/sh -c "apk add --no-cache openssh &&
      ssh-keygen -A &&
      echo \"root:$${SSH_PASSWORD:-certops}\" | chpasswd &&
      sed -i 's/#*PermitRootLogin.*/PermitRootLogin yes/' /etc/ssh/sshd_config &&
      /usr/sbin/sshd &&
      nginx -g 'daemon off;'"
